<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个简单网页</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        header {
            background: #4a6bff;
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        
        .content {
            padding: 40px;
        }
        
        p {
            line-height: 1.8;
            font-size: 1.1em;
        }
        
        .btn {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #ff5252;
            transform: translateY(-3px);
        }
        
        footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>欢迎来到我的网页！</h1>
            <p>这是一个简单漂亮的 HTML 示例</p>
        </header>
        
        <div class="content">
            <h2>你好，世界！👋</h2>
            <p>这是我用纯 HTML + CSS 创建的一个简单网页。你可以直接复制下面的代码，保存为 <strong>index.html</strong> 文件，然后用浏览器打开。</p>
            
            <ul>
                <li>✅ 响应式设计（手机和电脑都好看）</li>
                <li>✅ 现代渐变背景</li>
                <li>✅ 悬停动画效果</li>
                <li>✅ 支持中文</li>
            </ul>
            
            <a href="#" class="btn" onclick="showMessage()">点击我试试</a>
        </div>
        
        <footer>
            <p>由 Grok 帮你快速生成 • © 2026</p>
        </footer>
    </div>

    <script>
        function showMessage() {
            alert("🎉 你好！感谢你使用这个简单网页示例！");
        }
    </script>
</body>
</html>
